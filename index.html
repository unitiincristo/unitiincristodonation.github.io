<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sostieni la nostra Comunità - Uniti In Cristo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            padding: 40px 25px;
            border: none;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .circular-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-image: url('copertina.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }

        h1 { font-size: 24px; color: #ffffff; margin: 0 0 5px 0; letter-spacing: 1px; font-weight: bold; }
        h2 { font-size: 20px; color: #aaaaaa; margin-bottom: 30px; font-weight: bold; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-paypal { background-color: #0070ba; color: white; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn img { width: 20px; height: 20px; margin-right: 10px; }

        /* Contenitore Dati Bancari */
        .iban-section {
            margin-top: 25px;
            text-align: left;
        }
        .copy-box {
            background-color: #252525;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.2s;
            position: relative;
        }
        .copy-box:active { background-color: #333; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-family: monospace; color: #fff; font-size: 13px; display: block; word-break: break-all; }
        
        /* Sezione QR Code */
        .qr-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .qr-title { font-size: 12px; color: #aaa; margin-bottom: 15px; display: block; }
        .qr-image {
            background: white;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 150px;
            height: 150px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <div class="circular-logo"></div>
    </div>

    <div class="content">
        <h1>Uniti In Cristo</h1>
        <h2>Dona ora</h2>

        <a href="https://paypal.me/unitincristo" target="_blank" class="btn btn-paypal">
            <img src="https://img.icons8.com/color/48/000000/paypal.png" alt="PayPal">
            PayPal
        </a>

        <div class="iban-section">
            <div class="copy-box" onclick="copyText('IT79T0760112100001049342510', 'IBAN')">
                <span class="label">Tocca per copiare IBAN</span>
                <strong class="value">IT79 T076 0112 1000 0104 9342 510</strong>
            </div>

            <div class="copy-box" onclick="copyText('ASSOCIAZIONE CRISTIANA EVANGELICA IN CRISTO', 'Intestatario')">
                <span class="label">Tocca per copiare Intestatario</span>
                <strong class="value">ASSOCIAZIONE CRISTIANA EVANGELICA...</strong>
            </div>

            <div class="copy-box" onclick="copyText('BPPIITRRXXX', 'BIC')">
                <span class="label">Tocca per copiare BIC (SWIFT)</span>
                <strong class="value">BPPIITRRXXX</strong>
            </div>
        </div>

        <div class="qr-section">
            <span class="qr-title">Scansiona con l'App della tua banca per compilare il bonifico in automatico</span>
            <div class="qr-image">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=BCD%0A002%0A1%0ASCT%0ABPPIITRRXXX%0AASSOCIAZIONE%20CRISTIANA%20EVANGELICA%20IN%20CRISTO%0AIT79T0760112100001049342510%0A%0A%0A%0AOfferta" alt="QR Bonifico" style="width: 100%; height: 100%;">
            </div>
        </div>
    </div>
</div>

<script>
    function copyText(text, label) {
        navigator.clipboard.writeText(text).then(() => {
            alert(label + " copiato!");
        });
    }
</script>

</body>
</html>
